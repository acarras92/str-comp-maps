<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rocco Forte &mdash; Brand Portfolio Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
    }
    .header {
      background: #1a2744;
      border-bottom: 3px solid #365314;
      padding: 14px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .header-left p { font-size: 11px; color: #8fa8d8; margin-top: 3px; }
    .header-right { font-size: 11px; color: #8fa8d8; }
    .header-right a { color: #8fa8d8; text-decoration: none; }
    .header-right a:hover { color: #fff; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: 290px;
      background: #fff;
      border-right: 1px solid #dde3ed;
      overflow-y: auto;
      flex-shrink: 0;
      box-shadow: 2px 0 8px rgba(0,0,0,0.06);
    }
    .sb-section { padding: 14px; border-bottom: 1px solid #eaecf0; }
    .sb-section h3 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: #8090b0;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .legend-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px; font-size: 12px; color: #334;
    }
    .leg-dot {
      width: 14px; height: 14px;
      transform: rotate(45deg);
      border: 2px solid rgba(0,0,0,0.15);
      flex-shrink: 0;
    }
    .hotel-item {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 9px 6px;
      cursor: pointer;
      border-bottom: 1px solid #f0f2f5;
    }
    .hotel-item:hover { background: #f0f5ff; }
    .h-pin {
      width: 22px; height: 22px;
      transform: rotate(45deg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .h-pin-num {
      transform: rotate(-45deg);
      color: #fff;
      font-weight: 700;
      font-size: 10px;
    }
    .h-info h4 { font-size: 12px; font-weight: 600; color: #1a2744; line-height: 1.3; }
    .h-info .h-meta { font-size: 10px; color: #7080a0; margin-top: 2px; }
    .sidebar-footer {
      padding: 10px 14px;
      font-size: 10px;
      color: #aabbd0;
      border-top: 1px solid #eaecf0;
    }
    #map { flex: 1; }
    .gm-iw { font-family: 'Segoe UI', Arial, sans-serif; min-width: 220px; max-width: 270px; }
    .gm-iw-title { font-size: 14px; font-weight: 700; color: #1a2744; line-height: 1.3; }
    .gm-iw-brand { font-size: 10px; color: #365314; text-transform: uppercase; letter-spacing: 0.6px; margin: 2px 0 8px; font-weight: 600; }
    .gm-iw-meta { font-size: 11px; color: #556; margin-bottom: 3px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Rocco Forte &mdash; Brand Portfolio</h1>
    <p>Rocco Forte Hotels — family-run UK/Italian luxury &nbsp;&middot;&nbsp; 14 properties mapped</p>
  </div>
  <div class="header-right">
    <a href="../">&larr; All Maps</a> &nbsp;&middot;&nbsp; <a href="../global/">Global Map</a>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-section">
      <h3>Legend</h3>
      <div class="legend-row"><div class="leg-dot" style="background:#365314;"></div> Rocco Forte Property</div>
    </div>
    <div class="sb-section" style="border-bottom:none;">
      <h3>Properties &mdash; Click to Navigate</h3>
      <div id="hotel-list"></div>
    </div>
    <div class="sidebar-footer">
      Reference map &middot; Brand portfolio only &middot; No STR performance data
    </div>
  </div>
  <div id="map"></div>
</div>

<script>
  const HOTELS = [
  {
    "name": "Brown's Hotel",
    "address": "33 Albemarle Street, Mayfair",
    "city": "London W1S 4BP",
    "country": "UK",
    "lat": 51.509131,
    "lng": -0.1421129
  },
  {
    "name": "The Balmoral",
    "address": "1 Princes Street",
    "city": "Edinburgh EH2 2EQ",
    "country": "UK",
    "lat": 55.9530355,
    "lng": -3.1895371
  },
  {
    "name": "Rocco Forte House",
    "address": "70 St James's Street",
    "city": "London SW1A 1LE",
    "country": "UK",
    "lat": 51.5059176,
    "lng": -0.139061
  },
  {
    "name": "Hotel de Russie",
    "address": "Via del Babuino 9",
    "city": "00187 Rome",
    "country": "Italy",
    "lat": 41.9099435,
    "lng": 12.4774581
  },
  {
    "name": "Hotel de La Ville",
    "address": "Via Sistina 69",
    "city": "00187 Rome",
    "country": "Italy",
    "lat": 41.9057524,
    "lng": 12.484302
  },
  {
    "name": "Hotel Savoy",
    "address": "Piazza della Repubblica 7",
    "city": "50123 Florence",
    "country": "Italy",
    "lat": 43.7718785,
    "lng": 11.2545574
  },
  {
    "name": "Verdura Resort",
    "address": "SS 115 KM 131",
    "city": "92100 Sciacca, Sicily",
    "country": "Italy",
    "lat": 37.4706699,
    "lng": 13.1931074
  },
  {
    "name": "Masseria Torre Maizza",
    "address": "Savelletri di Fasano",
    "city": "72010 Brindisi, Puglia",
    "country": "Italy",
    "lat": 40.8589668,
    "lng": 17.3872604
  },
  {
    "name": "Hotel Amigo",
    "address": "Rue de l'Amigo 1\u20133",
    "city": "1000 Brussels",
    "country": "Belgium",
    "lat": 50.84614140000001,
    "lng": 4.351395399999999
  },
  {
    "name": "Hotel de Rome",
    "address": "Behrenstrasse 37",
    "city": "10117 Berlin",
    "country": "Germany",
    "lat": 52.5157859,
    "lng": 13.3940599
  },
  {
    "name": "The Charles Hotel",
    "address": "Sophienstrasse 28",
    "city": "80333 Munich",
    "country": "Germany",
    "lat": 48.1427505,
    "lng": 11.5624963
  },
  {
    "name": "Villa Kennedy",
    "address": "Kennedyallee 70",
    "city": "60596 Frankfurt am Main",
    "country": "Germany",
    "lat": 50.09724749999999,
    "lng": 8.6695244
  },
  {
    "name": "Hotel Astoria",
    "address": "Bolshaya Morskaya Street 39",
    "city": "St. Petersburg 190000",
    "country": "Russia",
    "lat": 59.93282900000001,
    "lng": 30.308868
  },
  {
    "name": "Palazzo Sirignano",
    "address": "Via Sirignano 11",
    "city": "80121 Naples",
    "country": "Italy",
    "lat": 40.8338996,
    "lng": 14.232748
  }
];
  const COLOR = "#365314";
  let map, infoWindow;
  const markers = [];

  function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 47.660996364285715, lng: 10.417504735714285 },
      zoom: 3,
      mapTypeControl: true,
      streetViewControl: false,
      fullscreenControl: true,
    });
    infoWindow = new google.maps.InfoWindow({ maxWidth: 290 });

    const listEl = document.getElementById('hotel-list');
    const bounds = new google.maps.LatLngBounds();

    HOTELS.forEach((h, i) => {
      const label = String(i + 1);
      const svgIcon = {
        url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 34 34">
            <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.35"/></filter>
            <rect x="6" y="6" width="22" height="22" transform="rotate(45 17 17)"
                  fill="${COLOR}" stroke="white" stroke-width="2" filter="url(#s)"/>
            <text x="17" y="20" text-anchor="middle" font-family="Arial,sans-serif"
                  font-size="11" font-weight="bold" fill="white">${label}</text>
          </svg>`),
        scaledSize: new google.maps.Size(34, 34),
        anchor: new google.maps.Point(17, 17),
      };

      const marker = new google.maps.Marker({
        position: { lat: h.lat, lng: h.lng },
        map,
        icon: svgIcon,
        title: h.name,
      });
      markers.push(marker);
      bounds.extend({ lat: h.lat, lng: h.lng });

      const fullAddr = [h.address, h.city, h.country].filter(Boolean).join(', ');
      const iwContent = `
        <div class="gm-iw">
          <div class="gm-iw-title">${h.name}</div>
          <div class="gm-iw-brand">Rocco Forte</div>
          <div class="gm-iw-meta">${fullAddr}</div>
        </div>`;
      marker.addListener('click', () => {
        infoWindow.setContent(iwContent);
        infoWindow.open(map, marker);
      });

      const item = document.createElement('div');
      item.className = 'hotel-item';
      item.innerHTML = `
        <div class="h-pin" style="background:${COLOR}"><span class="h-pin-num">${label}</span></div>
        <div class="h-info">
          <h4>${h.name}</h4>
          <div class="h-meta">${[h.city, h.country].filter(Boolean).join(', ')}</div>
        </div>`;
      item.addEventListener('click', () => {
        map.panTo({ lat: h.lat, lng: h.lng });
        map.setZoom(14);
        infoWindow.setContent(iwContent);
        infoWindow.open(map, marker);
      });
      listEl.appendChild(item);
    });

    map.fitBounds(bounds, { top: 60, right: 60, bottom: 60, left: 60 });
  }
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCTAmcCrmL2Z-SerlTKHoG3xPQaGcvmKcU&callback=initMap" async defer></script>

</body>
</html>
