<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One&Only &mdash; Brand Portfolio Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
    }
    .header {
      background: #1a2744;
      border-bottom: 3px solid #0c4a6e;
      padding: 14px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .header-left p { font-size: 11px; color: #8fa8d8; margin-top: 3px; }
    .header-right { font-size: 11px; color: #8fa8d8; }
    .header-right a { color: #8fa8d8; text-decoration: none; }
    .header-right a:hover { color: #fff; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: 290px;
      background: #fff;
      border-right: 1px solid #dde3ed;
      overflow-y: auto;
      flex-shrink: 0;
      box-shadow: 2px 0 8px rgba(0,0,0,0.06);
    }
    .sb-section { padding: 14px; border-bottom: 1px solid #eaecf0; }
    .sb-section h3 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: #8090b0;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .legend-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px; font-size: 12px; color: #334;
    }
    .leg-dot {
      width: 14px; height: 14px;
      transform: rotate(45deg);
      border: 2px solid rgba(0,0,0,0.15);
      flex-shrink: 0;
    }
    .hotel-item {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 9px 6px;
      cursor: pointer;
      border-bottom: 1px solid #f0f2f5;
    }
    .hotel-item:hover { background: #f0f5ff; }
    .h-pin {
      width: 22px; height: 22px;
      transform: rotate(45deg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .h-pin-num {
      transform: rotate(-45deg);
      color: #fff;
      font-weight: 700;
      font-size: 10px;
    }
    .h-info h4 { font-size: 12px; font-weight: 600; color: #1a2744; line-height: 1.3; }
    .h-info .h-meta { font-size: 10px; color: #7080a0; margin-top: 2px; }
    .sidebar-footer {
      padding: 10px 14px;
      font-size: 10px;
      color: #aabbd0;
      border-top: 1px solid #eaecf0;
    }
    #map { flex: 1; }
    .gm-iw { font-family: 'Segoe UI', Arial, sans-serif; min-width: 220px; max-width: 270px; }
    .gm-iw-title { font-size: 14px; font-weight: 700; color: #1a2744; line-height: 1.3; }
    .gm-iw-brand { font-size: 10px; color: #0c4a6e; text-transform: uppercase; letter-spacing: 0.6px; margin: 2px 0 8px; font-weight: 600; }
    .gm-iw-meta { font-size: 11px; color: #556; margin-bottom: 3px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>One&Only &mdash; Brand Portfolio</h1>
    <p>One&Only Resorts — ultra-private destination luxury &nbsp;&middot;&nbsp; 14 properties mapped</p>
  </div>
  <div class="header-right">
    <a href="../">&larr; All Maps</a> &nbsp;&middot;&nbsp; <a href="../global/">Global Map</a>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-section">
      <h3>Legend</h3>
      <div class="legend-row"><div class="leg-dot" style="background:#0c4a6e;"></div> One&Only Property</div>
    </div>
    <div class="sb-section" style="border-bottom:none;">
      <h3>Properties &mdash; Click to Navigate</h3>
      <div id="hotel-list"></div>
    </div>
    <div class="sidebar-footer">
      Reference map &middot; Brand portfolio only &middot; No STR performance data
    </div>
  </div>
  <div id="map"></div>
</div>

<script>
  const HOTELS = [
  {
    "name": "One&Only Palmilla",
    "address": "Carretera Transpeninsular KM 7.5 Punta Palmilla",
    "city": "San Jos\u00e9 del Cabo, BCS",
    "country": "Mexico",
    "lat": 23.0105838,
    "lng": -109.7167683
  },
  {
    "name": "One&Only Mandarina",
    "address": "Riviera Nayarit",
    "city": "Municipio de Bah\u00eda de Banderas, Nayarit",
    "country": "Mexico",
    "lat": 20.9778543,
    "lng": -105.3309758
  },
  {
    "name": "One&Only Moonlight Basin",
    "address": "50 Moonlight Basin Road",
    "city": "Big Sky, MT 59716",
    "country": "USA",
    "lat": 45.3228732,
    "lng": -111.4285455
  },
  {
    "name": "One&Only Royal Mirage",
    "address": "Al Sufouh Road",
    "city": "Dubai 37252",
    "country": "UAE",
    "lat": 25.1003586,
    "lng": 55.1571736
  },
  {
    "name": "One&Only The Palm",
    "address": "East Crescent Road, Palm Jumeirah",
    "city": "Dubai",
    "country": "UAE",
    "lat": 25.0994852,
    "lng": 55.1334634
  },
  {
    "name": "One&Only Za'abeel",
    "address": "Sheikh Zayed Road, Za'abeel",
    "city": "Dubai",
    "country": "UAE",
    "lat": 25.2282224,
    "lng": 55.2906545
  },
  {
    "name": "One&Only Portonovi",
    "address": "Valdanos Bay, Boka Bay",
    "city": "Herceg Novi",
    "country": "Montenegro",
    "lat": 42.4353789,
    "lng": 18.5968481
  },
  {
    "name": "One&Only K\u00e9a Island",
    "address": "Vourkari",
    "city": "K\u00e9a Island, Cyclades",
    "country": "Greece",
    "lat": 37.6128665,
    "lng": 24.273674
  },
  {
    "name": "One&Only Aesthesis",
    "address": "Kavouri",
    "city": "Vouliagmeni, Athens 16671",
    "country": "Greece",
    "lat": 37.8554478,
    "lng": 23.7512181
  },
  {
    "name": "One&Only Cape Town",
    "address": "Dock Road, V&A Waterfront",
    "city": "Cape Town 8001",
    "country": "South Africa",
    "lat": -33.9086313,
    "lng": 18.4162905
  },
  {
    "name": "One&Only Reethi Rah",
    "address": "",
    "city": "North Mal\u00e9 Atoll",
    "country": "Maldives",
    "lat": 4.520509,
    "lng": 73.366933
  },
  {
    "name": "One&Only Le Saint G\u00e9ran",
    "address": "Pointe de Flacq",
    "city": "",
    "country": "Mauritius",
    "lat": -20.1605098,
    "lng": 57.7562809
  },
  {
    "name": "One&Only Nyungwe House",
    "address": "",
    "city": "Nyungwe National Park, Southern Rwanda",
    "country": "Rwanda",
    "lat": -2.5282211,
    "lng": 29.2784212
  },
  {
    "name": "One&Only Gorilla's Nest",
    "address": "Kinigi",
    "city": "Volcanoes National Park, Northern Rwanda",
    "country": "Rwanda",
    "lat": -1.4415199,
    "lng": 29.5791051
  }
];
  const COLOR = "#0c4a6e";
  let map, infoWindow;
  const markers = [];

  function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 16.366049828571427, lng: 8.151698057142857 },
      zoom: 3,
      mapTypeControl: true,
      streetViewControl: false,
      fullscreenControl: true,
    });
    infoWindow = new google.maps.InfoWindow({ maxWidth: 290 });

    const listEl = document.getElementById('hotel-list');
    const bounds = new google.maps.LatLngBounds();

    HOTELS.forEach((h, i) => {
      const label = String(i + 1);
      const svgIcon = {
        url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 34 34">
            <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.35"/></filter>
            <rect x="6" y="6" width="22" height="22" transform="rotate(45 17 17)"
                  fill="${COLOR}" stroke="white" stroke-width="2" filter="url(#s)"/>
            <text x="17" y="20" text-anchor="middle" font-family="Arial,sans-serif"
                  font-size="11" font-weight="bold" fill="white">${label}</text>
          </svg>`),
        scaledSize: new google.maps.Size(34, 34),
        anchor: new google.maps.Point(17, 17),
      };

      const marker = new google.maps.Marker({
        position: { lat: h.lat, lng: h.lng },
        map,
        icon: svgIcon,
        title: h.name,
      });
      markers.push(marker);
      bounds.extend({ lat: h.lat, lng: h.lng });

      const fullAddr = [h.address, h.city, h.country].filter(Boolean).join(', ');
      const iwContent = `
        <div class="gm-iw">
          <div class="gm-iw-title">${h.name}</div>
          <div class="gm-iw-brand">One&Only</div>
          <div class="gm-iw-meta">${fullAddr}</div>
        </div>`;
      marker.addListener('click', () => {
        infoWindow.setContent(iwContent);
        infoWindow.open(map, marker);
      });

      const item = document.createElement('div');
      item.className = 'hotel-item';
      item.innerHTML = `
        <div class="h-pin" style="background:${COLOR}"><span class="h-pin-num">${label}</span></div>
        <div class="h-info">
          <h4>${h.name}</h4>
          <div class="h-meta">${[h.city, h.country].filter(Boolean).join(', ')}</div>
        </div>`;
      item.addEventListener('click', () => {
        map.panTo({ lat: h.lat, lng: h.lng });
        map.setZoom(14);
        infoWindow.setContent(iwContent);
        infoWindow.open(map, marker);
      });
      listEl.appendChild(item);
    });

    map.fitBounds(bounds, { top: 60, right: 60, bottom: 60, left: 60 });
  }
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCTAmcCrmL2Z-SerlTKHoG3xPQaGcvmKcU&callback=initMap" async defer></script>

</body>
</html>
