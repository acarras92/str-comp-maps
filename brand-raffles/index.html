<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raffles &mdash; Brand Portfolio Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
    }
    .header {
      background: #1a2744;
      border-bottom: 3px solid #991b1b;
      padding: 14px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .header-left p { font-size: 11px; color: #8fa8d8; margin-top: 3px; }
    .header-right { font-size: 11px; color: #8fa8d8; }
    .header-right a { color: #8fa8d8; text-decoration: none; }
    .header-right a:hover { color: #fff; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: 290px;
      background: #fff;
      border-right: 1px solid #dde3ed;
      overflow-y: auto;
      flex-shrink: 0;
      box-shadow: 2px 0 8px rgba(0,0,0,0.06);
    }
    .sb-section { padding: 14px; border-bottom: 1px solid #eaecf0; }
    .sb-section h3 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: #8090b0;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .legend-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px; font-size: 12px; color: #334;
    }
    .leg-dot {
      width: 14px; height: 14px;
      transform: rotate(45deg);
      border: 2px solid rgba(0,0,0,0.15);
      flex-shrink: 0;
    }
    .hotel-item {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 9px 6px;
      cursor: pointer;
      border-bottom: 1px solid #f0f2f5;
    }
    .hotel-item:hover { background: #f0f5ff; }
    .h-pin {
      width: 22px; height: 22px;
      transform: rotate(45deg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .h-pin-num {
      transform: rotate(-45deg);
      color: #fff;
      font-weight: 700;
      font-size: 10px;
    }
    .h-info h4 { font-size: 12px; font-weight: 600; color: #1a2744; line-height: 1.3; }
    .h-info .h-meta { font-size: 10px; color: #7080a0; margin-top: 2px; }
    .sidebar-footer {
      padding: 10px 14px;
      font-size: 10px;
      color: #aabbd0;
      border-top: 1px solid #eaecf0;
    }
    #map { flex: 1; }
    .gm-iw { font-family: 'Segoe UI', Arial, sans-serif; min-width: 220px; max-width: 270px; }
    .gm-iw-title { font-size: 14px; font-weight: 700; color: #1a2744; line-height: 1.3; }
    .gm-iw-brand { font-size: 10px; color: #991b1b; text-transform: uppercase; letter-spacing: 0.6px; margin: 2px 0 8px; font-weight: 600; }
    .gm-iw-meta { font-size: 11px; color: #556; margin-bottom: 3px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Raffles &mdash; Brand Portfolio</h1>
    <p>Raffles Hotels & Resorts — colonial-heritage luxury (Accor) &nbsp;&middot;&nbsp; 16 properties mapped</p>
  </div>
  <div class="header-right">
    <a href="../">&larr; All Maps</a> &nbsp;&middot;&nbsp; <a href="../global/">Global Map</a>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-section">
      <h3>Legend</h3>
      <div class="legend-row"><div class="leg-dot" style="background:#991b1b;"></div> Raffles Property</div>
    </div>
    <div class="sb-section" style="border-bottom:none;">
      <h3>Properties &mdash; Click to Navigate</h3>
      <div id="hotel-list"></div>
    </div>
    <div class="sidebar-footer">
      Reference map &middot; Brand portfolio only &middot; No STR performance data
    </div>
  </div>
  <div id="map"></div>
</div>

<script>
  const HOTELS = [
  {
    "name": "Raffles Singapore",
    "address": "1 Beach Road",
    "city": "Singapore 189673",
    "country": "Singapore",
    "lat": 1.294889,
    "lng": 103.854483
  },
  {
    "name": "Raffles Sentosa Resort & Spa",
    "address": "101 Siloso Road, Sentosa",
    "city": "Singapore 098970",
    "country": "Singapore",
    "lat": 1.2576829,
    "lng": 103.8097837
  },
  {
    "name": "Raffles Boston",
    "address": "40 Trinity Place, Back Bay",
    "city": "Boston, MA 02116",
    "country": "USA",
    "lat": 42.3485405,
    "lng": -71.07487110000001
  },
  {
    "name": "Le Royal Monceau \u2013 Raffles Paris",
    "address": "37 Avenue Hoche",
    "city": "75008 Paris",
    "country": "France",
    "lat": 48.8757605,
    "lng": 2.300295
  },
  {
    "name": "Raffles London at The OWO",
    "address": "57 Whitehall",
    "city": "London SW1A 2BX",
    "country": "UK",
    "lat": 51.5051366,
    "lng": -0.1256685
  },
  {
    "name": "Raffles Warsaw",
    "address": "Grzybowska 45",
    "city": "00-844 Warsaw",
    "country": "Poland",
    "lat": 52.2342203,
    "lng": 20.9905224
  },
  {
    "name": "Raffles Istanbul",
    "address": "Zorlu Center, Levaz\u0131m Mah. Vadi Caddesi, Be\u015fikta\u015f",
    "city": "34340 Istanbul",
    "country": "Turkey",
    "lat": 41.066551,
    "lng": 29.018055
  },
  {
    "name": "Raffles Doha",
    "address": "Marina East Street, Lusail Marina District",
    "city": "Lusail City, Doha",
    "country": "Qatar",
    "lat": 25.3899207,
    "lng": 51.5314542
  },
  {
    "name": "Raffles Al Areen Palace Bahrain",
    "address": "Zallaq Highway",
    "city": "Sakhir",
    "country": "Bahrain",
    "lat": 26.0022717,
    "lng": 50.5188013
  },
  {
    "name": "Raffles The Palm Dubai",
    "address": "East Crescent Road, Palm Jumeirah",
    "city": "Dubai",
    "country": "UAE",
    "lat": 25.1103869,
    "lng": 55.1098091
  },
  {
    "name": "Raffles Udaipur",
    "address": "Shiv Sagar Island",
    "city": "Udaipur, Rajasthan 313001",
    "country": "India",
    "lat": 24.581621,
    "lng": 73.8193223
  },
  {
    "name": "Raffles Jaipur",
    "address": "Khasa Kothi Circle, MI Road",
    "city": "Jaipur, Rajasthan 302001",
    "country": "India",
    "lat": 26.9169655,
    "lng": 75.8047136
  },
  {
    "name": "Raffles Shenzhen",
    "address": "One Shenzhen Bay, Nanshan District",
    "city": "Shenzhen 518054",
    "country": "China",
    "lat": 22.505953,
    "lng": 113.94243
  },
  {
    "name": "Raffles Hainan",
    "address": "Boao",
    "city": "Qionghai City, Hainan Province",
    "country": "China",
    "lat": 19.159714,
    "lng": 110.586606
  },
  {
    "name": "Raffles Bali",
    "address": "Jalan Karang Mas Sejahtera",
    "city": "Jimbaran, Bali 80361",
    "country": "Indonesia",
    "lat": -8.7864398,
    "lng": 115.1581541
  },
  {
    "name": "Raffles Maldives Meradhoo Resort",
    "address": "",
    "city": "Meradhoo Island, Gaafu Alifu Atoll",
    "country": "Maldives",
    "lat": 0.5783250999999999,
    "lng": 73.0946629
  }
];
  const COLOR = "#991b1b";
  let map, infoWindow;
  const markers = [];

  function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 25.00259368125, lng: 56.7711595625 },
      zoom: 3,
      mapTypeControl: true,
      streetViewControl: false,
      fullscreenControl: true,
    });
    infoWindow = new google.maps.InfoWindow({ maxWidth: 290 });

    const listEl = document.getElementById('hotel-list');
    const bounds = new google.maps.LatLngBounds();

    HOTELS.forEach((h, i) => {
      const label = String(i + 1);
      const svgIcon = {
        url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 34 34">
            <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.35"/></filter>
            <rect x="6" y="6" width="22" height="22" transform="rotate(45 17 17)"
                  fill="${COLOR}" stroke="white" stroke-width="2" filter="url(#s)"/>
            <text x="17" y="20" text-anchor="middle" font-family="Arial,sans-serif"
                  font-size="11" font-weight="bold" fill="white">${label}</text>
          </svg>`),
        scaledSize: new google.maps.Size(34, 34),
        anchor: new google.maps.Point(17, 17),
      };

      const marker = new google.maps.Marker({
        position: { lat: h.lat, lng: h.lng },
        map,
        icon: svgIcon,
        title: h.name,
      });
      markers.push(marker);
      bounds.extend({ lat: h.lat, lng: h.lng });

      const fullAddr = [h.address, h.city, h.country].filter(Boolean).join(', ');
      const iwContent = `
        <div class="gm-iw">
          <div class="gm-iw-title">${h.name}</div>
          <div class="gm-iw-brand">Raffles</div>
          <div class="gm-iw-meta">${fullAddr}</div>
        </div>`;
      marker.addListener('click', () => {
        infoWindow.setContent(iwContent);
        infoWindow.open(map, marker);
      });

      const item = document.createElement('div');
      item.className = 'hotel-item';
      item.innerHTML = `
        <div class="h-pin" style="background:${COLOR}"><span class="h-pin-num">${label}</span></div>
        <div class="h-info">
          <h4>${h.name}</h4>
          <div class="h-meta">${[h.city, h.country].filter(Boolean).join(', ')}</div>
        </div>`;
      item.addEventListener('click', () => {
        map.panTo({ lat: h.lat, lng: h.lng });
        map.setZoom(14);
        infoWindow.setContent(iwContent);
        infoWindow.open(map, marker);
      });
      listEl.appendChild(item);
    });

    map.fitBounds(bounds, { top: 60, right: 60, bottom: 60, left: 60 });
  }
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCTAmcCrmL2Z-SerlTKHoG3xPQaGcvmKcU&callback=initMap" async defer></script>

</body>
</html>
