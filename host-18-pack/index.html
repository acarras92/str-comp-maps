const CENTER = { lat: 34.44330285, lng: -114.51081969999998 };
const LINK_SUBJECTS = false;
let map;
let markers = [];            // { marker, memberships }
let bySet = {};            // slug → [markerRecord]
let infoWindow;
const activeSets = new Set(COMP_SETS.map(c => c.slug));

function buildLegend() {
  const el = document.getElementById('legend');
  const strSets = COMP_SETS.filter(c => !c.is_brand);
  const brandSets = COMP_SETS.filter(c => c.is_brand);

  function renderRow(cs) {
    const row = document.createElement('div');
    row.className = 'legend-item';
    row.dataset.slug = cs.slug;
    const swatchClass = cs.is_brand ? 'legend-swatch diamond' : 'legend-swatch';
    const tag = cs.is_brand ? '<span class="brand-tag">BRAND</span>' : '';
    row.innerHTML = `
      <div class="${swatchClass}" style="background:${cs.color}"></div>
      <div class="legend-text">
        <div class="legend-name">${cs.name}${tag}</div>
        <div class="legend-meta">${cs.hotel_count} hotels · ${cs.report_period}</div>
      </div>
    `;
    row.addEventListener('click', () => toggleSet(cs.slug));
    return row;
  }

  if (strSets.length) {
    const h = document.createElement('div');
    h.className = 'legend-section';
    h.textContent = 'STR Comp Sets';
    el.appendChild(h);
    strSets.forEach(cs => el.appendChild(renderRow(cs)));
  }
  if (brandSets.length) {
    const h = document.createElement('div');
    h.className = 'legend-section';
    h.textContent = 'Brand Portfolios';
    el.appendChild(h);
    brandSets.forEach(cs => el.appendChild(renderRow(cs)));
  }
}

function toggleSet(slug) {
  if (activeSets.has(slug)) activeSets.delete(slug);
  else activeSets.add(slug);
  refresh();
}

function toggleAll(on) {
  activeSets.clear();
  if (on) COMP_SETS.forEach(c => activeSets.add(c.slug));
  refresh();
}

function refresh() {
  document.querySelectorAll('.legend-item').forEach(el => {
    el.classList.toggle('off', !activeSets.has(el.dataset.slug));
  });
  markers.forEach(rec => {
    const visibleMems = rec.memberships.filter(m => activeSets.has(m.slug));
    if (visibleMems.length === 0) {
      rec.marker.setMap(null);
      return;
    }
    rec.marker.setMap(map);
    // Icon priority: subject > brand > comp.
    const primary =
      visibleMems.find(m => m.role === 'subject') ||
      visibleMems.find(m => m.role === 'brand') ||
      visibleMems[0];
    rec.marker.setIcon(iconFor(primary, visibleMems.length > 1));
  });
}

function iconFor(primary, multi) {
  if (primary.role === 'subject') {
    return {
      path: 'M 0,-14 L 4,-4 14,-4 6,2 9,12 0,6 -9,12 -6,2 -14,-4 -4,-4 Z',
      fillColor: primary.color,
      fillOpacity: 1.0,
      strokeColor: '#ffffff',
      strokeWeight: 2,
      scale: 1.0,
    };
  }
  if (primary.role === 'brand') {
    return {
      path: 'M 0,-11 L 11,0 0,11 -11,0 Z',
      fillColor: primary.color,
      fillOpacity: 1.0,
      strokeColor: '#ffffff',
      strokeWeight: 2,
      scale: 1.0,
    };
  }
  return {
    path: google.maps.SymbolPath.CIRCLE,
    fillColor: primary.color,
    fillOpacity: 0.95,
    strokeColor: multi ? '#111827' : '#ffffff',
    strokeWeight: multi ? 2 : 1.5,
    scale: 8,
  };
}

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: CENTER,
    zoom: 4,
    mapTypeControl: true,
    streetViewControl: false,
    fullscreenControl: true,
  });
  infoWindow = new google.maps.InfoWindow();

  HOTELS.forEach(h => {
    const primary =
      h.memberships.find(m => m.role === 'subject') ||
      h.memberships.find(m => m.role === 'brand') ||
      h.memberships[0];
    const marker = new google.maps.Marker({
      position: { lat: h.lat, lng: h.lng },
      map,
      title: h.name,
      icon: iconFor(primary, h.memberships.length > 1),
      zIndex: primary.role === 'subject' ? 1000 : (primary.role === 'brand' ? 500 : 100),
    });
    marker.addListener('click', () => {
      const memsHtml = h.memberships
        .filter(m => activeSets.has(m.slug))
        .map(m => `<div class="mem">
            <span class="dot" style="background:${m.color}"></span>
            ${LINK_SUBJECTS ? `<a href="../${m.slug}/">${m.subject_name}</a>` : `<span class="setname">${m.subject_name}</span>`}
            <span class="role">${m.role}</span>
          </div>`).join('');
      infoWindow.setContent(`
        <div class="iw">
          <h3>${h.name}</h3>
          <div class="addr">${h.city_state} ${h.zip} · ${h.rooms} rooms</div>
          <div><strong>Appears in:</strong></div>
          ${memsHtml}
        </div>
      `);
      infoWindow.open(map, marker);
    });
    const rec = { marker, memberships: h.memberships };
    markers.push(rec);
    h.memberships.forEach(m => {
      (bySet[m.slug] = bySet[m.slug] || []).push(rec);
    });
  });

  // Fit bounds to all visible markers at load
  const bounds = new google.maps.LatLngBounds();
  HOTELS.forEach(h => bounds.extend({ lat: h.lat, lng: h.lng }));
  map.fitBounds(bounds);
}

buildLegend();
</script>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCTAmcCrmL2Z-SerlTKHoG3xPQaGcvmKcU&callback=initMap"></script>
