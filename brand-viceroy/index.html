<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viceroy &mdash; Brand Portfolio Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
    }
    .header {
      background: #1a2744;
      border-bottom: 3px solid #7c3aed;
      padding: 14px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .header-left p { font-size: 11px; color: #8fa8d8; margin-top: 3px; }
    .header-right { font-size: 11px; color: #8fa8d8; }
    .header-right a { color: #8fa8d8; text-decoration: none; }
    .header-right a:hover { color: #fff; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: 290px;
      background: #fff;
      border-right: 1px solid #dde3ed;
      overflow-y: auto;
      flex-shrink: 0;
      box-shadow: 2px 0 8px rgba(0,0,0,0.06);
    }
    .sb-section { padding: 14px; border-bottom: 1px solid #eaecf0; }
    .sb-section h3 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: #8090b0;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .legend-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px; font-size: 12px; color: #334;
    }
    .leg-dot {
      width: 14px; height: 14px;
      transform: rotate(45deg);
      border: 2px solid rgba(0,0,0,0.15);
      flex-shrink: 0;
    }
    .hotel-item {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 9px 6px;
      cursor: pointer;
      border-bottom: 1px solid #f0f2f5;
    }
    .hotel-item:hover { background: #f0f5ff; }
    .h-pin {
      width: 22px; height: 22px;
      transform: rotate(45deg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .h-pin-num {
      transform: rotate(-45deg);
      color: #fff;
      font-weight: 700;
      font-size: 10px;
    }
    .h-info h4 { font-size: 12px; font-weight: 600; color: #1a2744; line-height: 1.3; }
    .h-info .h-meta { font-size: 10px; color: #7080a0; margin-top: 2px; }
    .sidebar-footer {
      padding: 10px 14px;
      font-size: 10px;
      color: #aabbd0;
      border-top: 1px solid #eaecf0;
    }
    #map { flex: 1; }
    .gm-iw { font-family: 'Segoe UI', Arial, sans-serif; min-width: 220px; max-width: 270px; }
    .gm-iw-title { font-size: 14px; font-weight: 700; color: #1a2744; line-height: 1.3; }
    .gm-iw-brand { font-size: 10px; color: #7c3aed; text-transform: uppercase; letter-spacing: 0.6px; margin: 2px 0 8px; font-weight: 600; }
    .gm-iw-meta { font-size: 11px; color: #556; margin-bottom: 3px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Viceroy &mdash; Brand Portfolio</h1>
    <p>Viceroy Hotels & Resorts — design-forward modern luxury &nbsp;&middot;&nbsp; 12 properties mapped</p>
  </div>
  <div class="header-right">
    <a href="../">&larr; All Maps</a> &nbsp;&middot;&nbsp; <a href="../global/">Global Map</a>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-section">
      <h3>Legend</h3>
      <div class="legend-row"><div class="leg-dot" style="background:#7c3aed;"></div> Viceroy Property</div>
    </div>
    <div class="sb-section" style="border-bottom:none;">
      <h3>Properties &mdash; Click to Navigate</h3>
      <div id="hotel-list"></div>
    </div>
    <div class="sidebar-footer">
      Reference map &middot; Brand portfolio only &middot; No STR performance data
    </div>
  </div>
  <div id="map"></div>
</div>

<script>
  const HOTELS = [
  {
    "name": "Viceroy Santa Monica",
    "address": "1819 Ocean Avenue",
    "city": "Santa Monica, CA 90401",
    "country": "USA",
    "lat": 34.0080531,
    "lng": -118.4903365
  },
  {
    "name": "Viceroy L'Ermitage Beverly Hills",
    "address": "9291 Burton Way",
    "city": "Beverly Hills, CA 90210",
    "country": "USA",
    "lat": 34.0726057,
    "lng": -118.3953843
  },
  {
    "name": "Viceroy Chicago",
    "address": "1118 North State Street",
    "city": "Chicago, IL 60610",
    "country": "USA",
    "lat": 41.9024809,
    "lng": -87.62870550000001
  },
  {
    "name": "Viceroy Washington DC",
    "address": "1430 Rhode Island Avenue NW",
    "city": "Washington, DC 20005",
    "country": "USA",
    "lat": 38.9081555,
    "lng": -77.03292239999999
  },
  {
    "name": "Viceroy Snowmass",
    "address": "130 Wood Road",
    "city": "Snowmass Village, CO 81615",
    "country": "USA",
    "lat": 39.2096046,
    "lng": -106.9446729
  },
  {
    "name": "Viceroy Dorado Beach",
    "address": "100 Dorado Beach Drive",
    "city": "Dorado 00646",
    "country": "Puerto Rico",
    "lat": 18.4753725,
    "lng": -66.3004613
  },
  {
    "name": "Viceroy Los Cabos",
    "address": "Paseo Malecon San Jose Lote 8",
    "city": "San Jos\u00e9 del Cabo, BCS 23405",
    "country": "Mexico",
    "lat": 23.0447849,
    "lng": -109.6984333
  },
  {
    "name": "Viceroy Riviera Maya",
    "address": "Playa Xcalacoco Frac 7",
    "city": "Playa del Carmen, Q. Roo 77710",
    "country": "Mexico",
    "lat": 20.6651478,
    "lng": -87.0334235
  },
  {
    "name": "Viceroy at Ombria Algarve",
    "address": "Rua da Ombria Nr 9",
    "city": "8100-396 T\u00f4r, Loul\u00e9, Algarve",
    "country": "Portugal",
    "lat": 37.1910484,
    "lng": -8.0127516
  },
  {
    "name": "Viceroy St. Lucia",
    "address": "Val des Pitons, La Baie de Silence",
    "city": "Soufri\u00e8re",
    "country": "Saint Lucia",
    "lat": 13.8278433,
    "lng": -61.0612116
  },
  {
    "name": "Viceroy Kopaonik",
    "address": "Brze\u0107e 36354",
    "city": "Kopaonik",
    "country": "Serbia",
    "lat": 43.2848069,
    "lng": 20.8104521
  },
  {
    "name": "Viceroy Alula",
    "address": "AlUla Old Town",
    "city": "AlUla, Medina Province",
    "country": "Saudi Arabia",
    "lat": 26.6250159,
    "lng": 37.9153868
  }
];
  const COLOR = "#7c3aed";
  let map, infoWindow;
  const markers = [];

  function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 30.934576625000002, lng: -65.15603866666667 },
      zoom: 3,
      mapTypeControl: true,
      streetViewControl: false,
      fullscreenControl: true,
    });
    infoWindow = new google.maps.InfoWindow({ maxWidth: 290 });

    const listEl = document.getElementById('hotel-list');
    const bounds = new google.maps.LatLngBounds();

    HOTELS.forEach((h, i) => {
      const label = String(i + 1);
      const svgIcon = {
        url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 34 34">
            <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.35"/></filter>
            <rect x="6" y="6" width="22" height="22" transform="rotate(45 17 17)"
                  fill="${COLOR}" stroke="white" stroke-width="2" filter="url(#s)"/>
            <text x="17" y="20" text-anchor="middle" font-family="Arial,sans-serif"
                  font-size="11" font-weight="bold" fill="white">${label}</text>
          </svg>`),
        scaledSize: new google.maps.Size(34, 34),
        anchor: new google.maps.Point(17, 17),
      };

      const marker = new google.maps.Marker({
        position: { lat: h.lat, lng: h.lng },
        map,
        icon: svgIcon,
        title: h.name,
      });
      markers.push(marker);
      bounds.extend({ lat: h.lat, lng: h.lng });

      const fullAddr = [h.address, h.city, h.country].filter(Boolean).join(', ');
      const iwContent = `
        <div class="gm-iw">
          <div class="gm-iw-title">${h.name}</div>
          <div class="gm-iw-brand">Viceroy</div>
          <div class="gm-iw-meta">${fullAddr}</div>
        </div>`;
      marker.addListener('click', () => {
        infoWindow.setContent(iwContent);
        infoWindow.open(map, marker);
      });

      const item = document.createElement('div');
      item.className = 'hotel-item';
      item.innerHTML = `
        <div class="h-pin" style="background:${COLOR}"><span class="h-pin-num">${label}</span></div>
        <div class="h-info">
          <h4>${h.name}</h4>
          <div class="h-meta">${[h.city, h.country].filter(Boolean).join(', ')}</div>
        </div>`;
      item.addEventListener('click', () => {
        map.panTo({ lat: h.lat, lng: h.lng });
        map.setZoom(14);
        infoWindow.setContent(iwContent);
        infoWindow.open(map, marker);
      });
      listEl.appendChild(item);
    });

    map.fitBounds(bounds, { top: 60, right: 60, bottom: 60, left: 60 });
  }
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCTAmcCrmL2Z-SerlTKHoG3xPQaGcvmKcU&callback=initMap" async defer></script>

</body>
</html>
